<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FloodAlert India</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Water Wave Background -->
    <div class="water-wave"></div>
    
    <!-- Registration Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <img src="assets/floodalert-logo.png" alt="FloodAlert India">
                    <span>FloodAlert <strong>India</strong></span>
                </div>
                <h1>Citizen Registration</h1>
                <p>Join our network to receive real-time flood alerts and contribute to community safety</p>
            </div>
            
            <form id="registerForm" action="Register" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" name="name" required placeholder="Enter your full name">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="contact">Mobile Number</label>
                    <div class="input-with-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="contact" name="contact" required placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}">
                    </div>
                </div>
                
                <div class="form-group">
				    <label for="state">State</label>
				    <div class="input-with-icon">
				        <i class="fas fa-flag"></i>
				        <input type="text" id="state" name="state" required placeholder="Enter your state">
				    </div>
				</div>
				
				<div class="form-group">
				    <label for="district">District</label>
				    <div class="input-with-icon">
				        <i class="fas fa-map"></i>
				        <input type="text" id="district" name="district" required placeholder="Enter your district">
				    </div>
				</div>
				
				<div class="form-group">
				    <label for="city">City</label>
				    <div class="input-with-icon">
				        <i class="fas fa-city"></i>
				        <input type="text" id="city" name="city" required placeholder="Enter your city">
				    </div>
				</div>
				
				<div class="form-group">
				    <label for="locality">Locality</label>
				    <div class="input-with-icon">
				        <i class="fas fa-location-arrow"></i>
				        <input type="text" id="locality" name="locality" required placeholder="Enter your locality or area name">
				    </div>
				</div>
				
				<div class="form-group">
				    <label for="pincode">Pincode</label>
				    <div class="input-with-icon">
				        <i class="fas fa-map-pin"></i>
				        <input type="text" id="pincode" name="pincode" required placeholder="Enter 6-digit pincode" pattern="[0-9]{6}">
				    </div>
				</div>
                
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" required placeholder="Create a strong password" minlength="8">
                        <button type="button" class="toggle-password" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-meter"></div>
                        <span class="strength-text">Password strength</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter your password">
                    </div>
                </div>
                
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="">Terms of Service</a> and <a href="">Privacy Policy</a></label>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-user-plus"></i> Register Now
                </button>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
